<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/images/icon.png" />
    <link rel="apple-touch-icon" href="/images/icon.png" />

    <!-- Primary Meta -->
    <title>HeartBeat — Heart rate monitoring from your phone's microphone</title>
    <meta name="description" content="HeartBeat uses your phone's microphone to measure your heart rate in 30 seconds. Free, open source, and 100% offline. No extra hardware needed." />
    <meta name="keywords" content="heart rate, heartbeat, BPM, heart rate monitor, phone microphone, health, android app, open source" />
    <meta name="author" content="Anmol Bhardwaj" />
    <meta name="theme-color" content="#E63946" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HeartBeat — Heart rate monitoring from your phone's microphone" />
    <meta property="og:description" content="Measure your heart rate in 30 seconds using just your phone's microphone. Free, open source, and 100% offline." />
    <meta property="og:image" content="/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="HeartBeat" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HeartBeat — Heart rate monitoring from your phone's microphone" />
    <meta name="twitter:description" content="Measure your heart rate in 30 seconds using just your phone's microphone. Free, open source, and 100% offline." />
    <meta name="twitter:image" content="/images/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Canonical -->
    <link rel="canonical" href="https://heartbeat-website.vercel.app" />
  </head>
  <body>
    <script>
      (function(){var t=localStorage.getItem('heartbeat-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
